[build]
publish = "."
functions = "netlify/functions"

[functions]
directory = "netlify/functions"
node_bundler = "esbuild"

[[redirects]]
from = "/api/public-config"
to = "/.netlify/functions/public-config"
status = 200
force = true

[[redirects]]
from = "/pages/cars/:slug.html"
to = "/cars/:slug"
status = 301
force = true

[[redirects]]
from = "/cars/*"
to = "/car.html"
status = 200
force = true